services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama # Persist Ollama models
    restart: always

  backend:
    build: .
    container_name: summarizer_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: always

  frontend:
    build: .
    container_name: summarizer_frontend
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - BACKEND_URL=http://backend:8000
    command: ["streamlit", "run", "frontend/streamlit_app.py", "--server.address", "0.0.0.0"]
    depends_on:
      - backend
    restart: always

volumes:
  ollama_data: {}